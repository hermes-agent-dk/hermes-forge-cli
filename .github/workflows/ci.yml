name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, linux, x64, vps]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check & build
        run: npm run build
      - name: Run tests
        run: npm test
      - name: Lint
        run: npm run lint

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: [self-hosted, linux, x64, vps]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Pack tarball
        run: npm pack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hermes-forge-cli-*.tgz
          generate_release_notes: true
